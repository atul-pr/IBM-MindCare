[phases.setup]
# Only use packages that exist in nixpacks' pinned Nixpkgs snapshot.
# gcc already includes g++ and the standard C++ library — no need for gcc-unwrapped or libstdcxx5.
nixPkgs = ["python311", "python311Packages.pip", "gcc", "cmake", "zlib"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install torch==2.2.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu --no-cache-dir",
    "pip install -r requirements.txt --no-cache-dir"
]

[phases.build]
cmds = [
    "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2', cache_folder='/tmp/hf_cache')\" || echo 'Model pre-download skipped'"
]

[start]
cmd = "gunicorn app:app --workers=3 --worker-class=gevent --worker-connections=10 --timeout=120 --bind=0.0.0.0:$PORT --log-level=info --access-logfile=- --error-logfile=- --preload"
