[build]
# Force Docker builder so nixpacks.toml is ignored
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn app:app --workers=1 --timeout=120 --bind=0.0.0.0:$PORT --log-level=debug --access-logfile=- --error-logfile=-"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
