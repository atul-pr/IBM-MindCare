[build]
builder = "nixpacks"
# nixpacks.toml handles the full build plan (packages, install, model pre-download)
# railway.toml only controls deploy settings

[deploy]
# 3 gevent workers — optimal for 1 shared vCPU on Railway Starter plan
# gevent = async I/O, perfect for concurrent HuggingFace/Groq API calls
startCommand = "gunicorn app:app --workers=3 --worker-class=gevent --worker-connections=10 --timeout=120 --bind=0.0.0.0:$PORT --log-level=info --access-logfile=- --error-logfile=- --preload"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
