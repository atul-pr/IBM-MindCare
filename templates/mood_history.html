<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood History | MindCare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <style>
        body {
            background: var(--body-bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .mood-history-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 i {
            color: #6366f1;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mood-row {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            box-shadow: var(--shadow);
        }

        .mood-row:hover {
            transform: translateY(-2px);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
        }

        .mood-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mood-icon {
            font-size: 32px;
        }

        .mood-details h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .mood-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .mood-badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-very-good {
            background: rgba(16, 185, 129, 0.1);
            color: #4ade80;
        }

        .badge-good {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .badge-okay {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }

        .badge-bad {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }

        .badge-very-bad {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 50px 0;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="mood-history-container">
        <div style="position: absolute; top: 20px; right: 20px;">
            <button class="theme-toggle-btn" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <i class="fas fa-moon theme-toggle-icon"></i>
            </button>
        </div>
        <a href="{{ url_for('dashboard') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1>
            <i class="fas fa-history"></i>
            Mood History
        </h1>
        <p class="subtitle">Tracking your emotional journey over the past 30 days.</p>

        <div id="historyList" class="history-list">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Retrieving your records...</p>
            </div>
        </div>
    </div>

    <script>
        const MOOD_MAP = [
            { label: 'Very Bad', emoji: '😢', class: 'very-bad' },
            { label: 'Bad', emoji: '😔', class: 'bad' },
            { label: 'Okay', emoji: '😐', class: 'okay' },
            { label: 'Good', emoji: '🙂', class: 'good' },
            { label: 'Very Good', emoji: '😊', class: 'very-good' }
        ];

        fetch('/mood-history')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('historyList');
                if (!data.history || data.history.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-ghost"></i>
                            <p>No mood records found yet. Start tracking today!</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = data.history.reverse().map(m => {
                    const mood = MOOD_MAP[m.mood - 1];
                    return `
                        <div class="mood-row">
                            <div class="mood-info">
                                <div class="mood-icon">${mood.emoji}</div>
                                <div class="mood-details">
                                    <h3>${mood.label}</h3>
                                    <div class="mood-date">${m.date}</div>
                                </div>
                            </div>
                            <div class="mood-badge badge-${mood.class}">${mood.label}</div>
                        </div>
                    `;
                }).join('');
            })
            .catch(err => {
                console.error(err);
                document.getElementById('historyList').innerHTML = '<p class="empty-state">Error loading history.</p>';
            });
    </script>
</body>

</html>
