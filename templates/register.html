<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MindCare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .shape {
            position: absolute;
            z-index: 0;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.5;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.2);
            top: -10%;
            right: -10%;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            background: rgba(168, 85, 247, 0.2);
            bottom: -10%;
            left: -10%;
        }

        .auth-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
            text-decoration: none;
        }

        .auth-logo i {
            color: #6366f1;
            font-size: 32px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group-full {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            transition: 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px 14px 50px;
            background: var(--bg-main);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-control:focus+i {
            color: #6366f1;
        }

        .btn-auth {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            grid-column: span 2;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .auth-footer {
            text-align: center;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            grid-column: span 2;
        }

        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 700;
        }

        .password-meter {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0;
            transition: 0.3s;
        }

        .strength-weak {
            background: #ef4444;
            width: 33%;
        }

        .strength-medium {
            background: #f59e0b;
            width: 66%;
        }

        .strength-strong {
            background: #10b981;
            width: 100%;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group-full,
            .form-group {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container">
        <div style="position: absolute; top: 20px; right: 20px;">
            <button class="theme-toggle-btn" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <i class="fas fa-moon theme-toggle-icon"></i>
            </button>
        </div>
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <i class="fas fa-brain"></i>
                <span>MindCare AI</span>
            </a>
            <h1>Create Account</h1>
            <p>Join MindCare to start your wellness journey.</p>
        </div>

        <div class="form-grid">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                <i class="fas fa-info-circle"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}" class="form-group-full" id="regForm">
                <div class="form-grid">
                    <div class="form-group-full">
                        <label for="username">User Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" name="username" class="form-control" placeholder="johndoe"
                                required autofocus>
                        </div>
                    </div>

                    <div class="form-group-full">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" class="form-control"
                                placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" class="form-control"
                                placeholder="••••••••" required oninput="updateMeter()">
                        </div>
                        <div class="password-meter">
                            <div class="meter-fill" id="meter"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm</label>
                        <div class="input-wrapper">
                            <i class="fas fa-shield-check"></i>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth form-group-full">
                        Create Free Account <i class="fas fa-user-plus"></i>
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function updateMeter() {
            const pass = document.getElementById('password').value;
            const meter = document.getElementById('meter');
            meter.className = 'meter-fill';
            if (pass.length > 0) {
                if (pass.length < 6) meter.classList.add('strength-weak');
                else if (pass.length < 10) meter.classList.add('strength-medium');
                else meter.classList.add('strength-strong');
            }
        }

        document.getElementById('regForm').onsubmit = function (e) {
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1 !== p2) {
                alert("Passwords do not match!");
                e.preventDefault();
            }
        }
    </script>
</body>

</html>
